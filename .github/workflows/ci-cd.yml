name: Continuous Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devops-app:${{ github.sha }} .

      - name: Execute Pytest
        run: docker run --rm devops-app:${{ github.sha }} python -m pytest test.py

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Images
        run: |
          docker tag devops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
          docker tag devops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}
