name: Continuous Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devops-system-api:${{ github.sha }} .

      - name: Execute Pytest
        run: docker run --rm devops-system-api:${{ github.sha }} python -m pytest test.py

      - name: Verify Application Health
        run: |
          docker run -d -p 5000:5000 --name app devops-system-api:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop app
          docker rm app

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Images
        run: |
          docker tag devops-system-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-system-api:latest
          docker tag devops-system-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-system-api:${{ github.sha }}

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-system-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-system-api:${{ github.sha }}
